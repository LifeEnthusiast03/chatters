version: '3.8'

services:
  redis:
    image: redis:latest
    container_name: redis-pii
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - double-slash-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  redis_data:

networks:
  double-slash-net:
    name: double-slash-net
    driver: bridge
