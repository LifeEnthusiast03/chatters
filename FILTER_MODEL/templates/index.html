<!DOCTYPE html>
<html>
<head>
    <title>Message Filter</title>
</head>
<body>
    <h1>Message Filter</h1>
    <p>Enter a message to check if it should be filtered:</p>
    <form action="/predict" method="POST">
        <textarea name="text" rows="4" cols="50" placeholder="Enter your message here..."></textarea><br><br>
        <input type="submit" value="Filter">
    </form>
    {% if prediction==0 or prediction==1 %}
        <h2>Result: {{ prediction }}</h2>
    {% endif %}
</body>
</html>
